name: PR Verify

on:
    pull_request:
        branches:
            - main
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    detect-changes:
        name: Detect Changes
        runs-on: ubuntu-latest
        timeout-minutes: 5
        outputs:
            package: ${{ steps.detect.outputs.package }}
            example: ${{ steps.detect.outputs.example }}
            docs: ${{ steps.detect.outputs.docs }}
            full: ${{ steps.detect.outputs.full }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Detect changed areas
              id: detect
              shell: bash
              run: |
                  set -euo pipefail

                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                    base_sha="${{ github.event.pull_request.base.sha }}"
                  else
                    base_sha="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"
                  fi

                  changed_files="$(git diff --name-only "$base_sha" HEAD || true)"
                  printf '%s\n' "$changed_files"

                  package=false
                  example=false
                  docs=false
                  full=false

                  while IFS= read -r file; do
                    [ -z "$file" ] && continue

                    case "$file" in
                      pnpm-lock.yaml|pnpm-workspace.yaml|package.json|tsconfig.json|vite.config.*|vitest.config.*|eslint.config.*|.prettierrc*|.prettierignore|.github/workflows/*|.github/actions/*|.github/actions/**)
                        full=true
                        ;;
                    esac

                    case "$file" in
                      packages/scone-ui/*|packages/scone-ui/**)
                        package=true
                        ;;
                    esac

                    case "$file" in
                      apps/example/*|apps/example/**)
                        example=true
                        ;;
                    esac

                    case "$file" in
                      apps/scone-docs/*|apps/scone-docs/**|docs/*|docs/**|README.md|AGENTS.md|.github/pull_request_template.md)
                        docs=true
                        ;;
                    esac
                  done <<< "$changed_files"

                  if [ "$full" = true ]; then
                    package=true
                    example=true
                    docs=true
                  fi

                  {
                    echo "package=$package"
                    echo "example=$example"
                    echo "docs=$docs"
                    echo "full=$full"
                  } >> "$GITHUB_OUTPUT"

    verify-governance:
        name: Verify Governance
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Verify governance files
              run: |
                  test -f AGENTS.md
                  test -f docs/AGENTS.md
                  test -f docs/00-governance/DOCUMENT-RULES.md
                  test -f docs/00-governance/TODO-RULES.md
                  test -f docs/00-governance/PR-RULES.md
                  test -f .github/pull_request_template.md
                  test -f .github/workflows/pr-verify.yml
                  test -f .github/actions/setup-pnpm/action.yml

                  if find docs -name '*.md' -print | grep -q ' '; then
                    echo "Document filenames must not contain spaces" >&2
                    exit 1
                  fi

    verify-package:
        name: Verify Package
        needs: detect-changes
        if: needs.detect-changes.outputs.package == 'true'
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: ./.github/actions/setup-pnpm

            - name: Verify package types
              run: pnpm --filter scone-ui typecheck

            - name: Verify package tests
              run: pnpm run test

            - name: Verify package build
              run: pnpm run build

            - name: Verify package pack
              run: pnpm run pack:check

    verify-example:
        name: Verify Example
        needs: detect-changes
        if: needs.detect-changes.outputs.example == 'true'
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: ./.github/actions/setup-pnpm

            - name: Verify example types
              run: pnpm --filter @scone-ui/example typecheck

            - name: Verify example tests
              run: pnpm run test:example

            - name: Verify example build
              run: pnpm run build:example

    verify-docs:
        name: Verify Docs
        needs: detect-changes
        if: needs.detect-changes.outputs.docs == 'true'
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: ./.github/actions/setup-pnpm

            - name: Verify docs types
              run: pnpm --filter @scone-ui/docs typecheck

            - name: Verify docs build
              run: pnpm run build:docs
